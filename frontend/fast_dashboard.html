<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TollPlaza AI - Fast Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            background: white;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card p-4">
            <h1 class="text-center">
                <i class="fas fa-car"></i> TollPlaza AI
            </h1>
            <p class="text-center text-muted">Vehicle Detection & Analytics System</p>
            
            <!-- Status -->
            <div id="status" class="alert alert-info text-center">
                <i class="fas fa-spinner fa-spin"></i> Connecting to backend...
            </div>
            
            <!-- Stats Row -->
            <div class="row mb-4" id="statsRow">
                <div class="col-md-3">
                    <div class="stat-card">
                        <i class="fas fa-car fa-2x mb-2"></i>
                        <div class="stat-number" id="totalVehicles">0</div>
                        <p>Total Vehicles</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <i class="fas fa-car-side fa-2x mb-2"></i>
                        <div class="stat-number" id="carCount">0</div>
                        <p>Cars</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <i class="fas fa-truck fa-2x mb-2"></i>
                        <div class="stat-number" id="truckCount">0</div>
                        <p>Trucks</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <i class="fas fa-bus fa-2x mb-2"></i>
                        <div class="stat-number" id="busCount">0</div>
                        <p>Buses</p>
                    </div>
                </div>
            </div>
            
            <!-- Detection Section -->
            <div class="row">
                <div class="col-md-6">
                    <div class="card p-3">
                        <h5><i class="fas fa-upload"></i> Vehicle Detection</h5>
                        <input type="file" id="imageFile" class="form-control mb-3" accept="image/*">
                        <button class="btn btn-primary w-100" onclick="detectVehicle()">
                            <i class="fas fa-search"></i> Detect Vehicles
                        </button>
                        <div id="detectionResult" class="mt-3"></div>
                    </div>
                </div>
                
                <div class="col-md-6">
                    <div class="card p-3">
                        <h5><i class="fas fa-download"></i> Reports</h5>
                        <button class="btn btn-success w-100 mb-2" onclick="downloadReport()">
                            <i class="fas fa-file-excel"></i> Download Excel Report
                        </button>
                        <button class="btn btn-info w-100" onclick="resetCounters()">
                            <i class="fas fa-sync"></i> Reset Counters
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p class="mt-2">Processing...</p>
            </div>
        </div>
    </div>
    
    <script>
        let retryCount = 0;
        const maxRetries = 3;
        
        // Check backend connection on load
        async function checkBackend() {
            try {
                const response = await fetch('http://localhost:8000/', {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                if (response.ok) {
                    document.getElementById('status').innerHTML = '<i class="fas fa-check-circle"></i> ✅ Backend Connected!';
                    document.getElementById('status').className = 'alert alert-success text-center';
                    fetchStats();
                    return true;
                }
            } catch (error) {
                console.log('Backend not ready');
            }
            
            if (retryCount < maxRetries) {
                retryCount++;
                document.getElementById('status').innerHTML = `<i class="fas fa-spinner fa-spin"></i> Connecting to backend... (Attempt ${retryCount}/${maxRetries})`;
                setTimeout(checkBackend, 2000);
            } else {
                document.getElementById('status').innerHTML = '<i class="fas fa-exclamation-triangle"></i> ⚠️ Backend not running. Start with: python app/main.py';
                document.getElementById('status').className = 'alert alert-danger text-center';
            }
            return false;
        }
        
        async function fetchStats() {
            try {
                const response = await fetch('http://localhost:8000/stats/camera1');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('totalVehicles').innerText = data.total || 0;
                    document.getElementById('carCount').innerText = data.counters.car || 0;
                    document.getElementById('truckCount').innerText = data.counters.truck || 0;
                    document.getElementById('busCount').innerText = data.counters.bus || 0;
                }
            } catch (error) {
                console.log('Stats fetch error:', error);
            }
        }
        
        async function detectVehicle() {
            const fileInput = document.getElementById('imageFile');
            if (!fileInput.files[0]) {
                alert('Please select an image');
                return;
            }
            
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            
            try {
                const response = await fetch('http://localhost:8000/detect', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                const resultDiv = document.getElementById('detectionResult');
                if (data.success) {
                    let html = `<div class="alert alert-success">✅ Found ${data.count} vehicles!</div>`;
                    html += '<div class="list-group">';
                    data.detections.forEach(d => {
                        html += `<div class="list-group-item">${d.type} - ${Math.round(d.confidence * 100)}% confidence</div>`;
                    });
                    html += '</div>';
                    resultDiv.innerHTML = html;
                    fetchStats();
                } else {
                    resultDiv.innerHTML = '<div class="alert alert-danger">No vehicles detected</div>';
                }
            } catch (error) {
                document.getElementById('detectionResult').innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
            } finally {
                loading.style.display = 'none';
            }
        }
        
        async function downloadReport() {
            window.open('http://localhost:8000/generate-report', '_blank');
        }
        
        async function resetCounters() {
            try {
                await fetch('http://localhost:8000/reset/camera1');
                fetchStats();
                alert('Counters reset successfully');
            } catch (error) {
                alert('Failed to reset counters');
            }
        }
        
        // Refresh stats every 10 seconds (not every second)
        setInterval(fetchStats, 10000);
        
        // Start the app
        checkBackend();
    </script>
</body>
</html>
