# YOLOv8 data configuration for toll plaza vehicle detection
path: ../datasets/toll_vehicles  # dataset root dir relative to this file
train: images/train  # train images (relative to 'path')
val: images/val  # val images (relative to 'path')
test: images/test  # test images (relative to 'path')

# Classes for toll plaza vehicles
names:
  0: bicycle
  1: car
  2: truck
  3: rickshaw