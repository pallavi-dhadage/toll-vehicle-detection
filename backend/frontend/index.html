<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toll Vehicle Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-4">
        <h1 class="text-3xl font-bold mb-4 text-center">Toll Plaza Vehicle Detection</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Upload Section -->
            <div class="bg-white p-4 rounded shadow">
                <h2 class="text-xl font-semibold mb-2">Upload Image</h2>
                <input type="file" id="imageInput" accept="image/*" class="mb-2">
                <button id="uploadBtn" class="bg-blue-500 text-white px-4 py-2 rounded">Detect Vehicles</button>
                <div id="result" class="mt-4"></div>
                <img id="preview" class="mt-2 max-w-full h-auto" style="display:none;">
            </div>
            
            <!-- Recent Detections -->
            <div class="bg-white p-4 rounded shadow">
                <h2 class="text-xl font-semibold mb-2">Recent Detections</h2>
                <div id="recentList" class="max-h-96 overflow-y-auto">
                    <ul id="recentUl"></ul>
                </div>
            </div>
        </div>
        
        <!-- Heatmap Section -->
        <div class="bg-white p-4 rounded shadow mt-6">
            <h2 class="text-xl font-semibold mb-2">Hourly Vehicle Frequency (Heatmap)</h2>
            <canvas id="heatmapChart" width="800" height="400"></canvas>
        </div>
    </div>
    
    <script>
        const apiBase = "http://localhost:8000";
        
        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('imageInput');
            const file = fileInput.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            
            const response = await fetch(`${apiBase}/detect/`, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            displayResult(data.detections);
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('preview');
                img.src = e.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(file);
            
            // Refresh recent list after upload
            fetchRecent();
        });
        
        function displayResult(detections) {
            const resultDiv = document.getElementById('result');
            if (detections.length === 0) {
                resultDiv.innerHTML = '<p class="text-red-500">No vehicles detected.</p>';
                return;
            }
            let html = '<h3 class="font-semibold">Detected Vehicles:</h3><ul>';
            detections.forEach(d => {
                html += `<li>${d.type} (confidence: ${(d.confidence*100).toFixed(2)}%)</li>`;
            });
            html += '</ul>';
            resultDiv.innerHTML = html;
        }
        
        async function fetchRecent() {
            const response = await fetch(`${apiBase}/detect/records?limit=10`);
            const records = await response.json();
            const ul = document.getElementById('recentUl');
            ul.innerHTML = '';
            records.forEach(r => {
                const li = document.createElement('li');
                li.textContent = `${new Date(r.timestamp).toLocaleString()} - ${r.vehicle_type} (${(r.confidence*100).toFixed(2)}%)`;
                ul.appendChild(li);
            });
        }
        
        async function fetchHeatmap() {
            const today = new Date();
            const start = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
            const end = today.toISOString().split('T')[0];
            const response = await fetch(`${apiBase}/heatmap/?start=${start}&end=${end}`);
            const data = await response.json();
            // Process data for Chart.js
            const hours = [...Array(24).keys()];
            const vehicleTypes = [...new Set(data.map(d => d.vehicle_type))];
            const datasets = vehicleTypes.map(type => ({
                label: type,
                data: hours.map(hour => {
                    const found = data.find(d => d.hour === hour && d.vehicle_type === type);
                    return found ? found.count : 0;
                }),
                borderWidth: 1
            }));
            const ctx = document.getElementById('heatmapChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: hours.map(h => `${h}:00`),
                    datasets: datasets
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: { display: true, text: 'Number of Vehicles' }
                        },
                        x: {
                            title: { display: true, text: 'Hour of Day' }
                        }
                    }
                }
            });
        }
        
        fetchRecent();
        fetchHeatmap();
    </script>
</body>
</html>
